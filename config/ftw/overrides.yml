# Overrides for CRS test suite running against Coraza deployed behind Envoy ext_proc.
# Based on https://github.com/united-security-providers/coraza-envoy-go-filter/blob/main/tests/ftw/overrides.yml
---
version: "v0.0.0"
meta:
  engine: "coraza"
  platform: "envoy-extproc"
  annotations:
    - purpose: "Overrides for CRS test suite running against Coraza deployed as an Envoy ext_proc filter"
test_overrides:
  # Tests not compatible with Envoy
  #
  # directly rejected by Envoy
  - rule_id: 911100
    test_ids: [5,7,8]
    reason: |
       Invalid HTTP methods TEST, FOO and SUBSCRIBE cause Envoy to drop the connection (HPE_INVALID_METHOD).
       Envoy v1.37 does not support custom HTTP methods. The request never reaches Coraza.
    output:
      expect_error: true
  - rule_id: 920100
    test_ids: [2,5,10,11,12,13,14,15]
    reason: |
       Malformed methods/versions/URIs (tab-prefixed GET, REALLYLONGUNREALMETHOD,
       CONNECT to hostname, backslash URIs, invalid version HTTP\\1.0, etc.)
       cause Envoy to drop the connection.
       The request does not reach Coraza therefore the rule is not triggered.
    output:
      expect_error: true
  - rule_id: 949110
    test_ids: [4]
    reason: |
       Invalid HTTP method REALLYLONGUNREALMETHOD causes Envoy to drop the connection (HPE_INVALID_METHOD).
       The request does not reach Coraza therefore the rule is not triggered.
    output:
      expect_error: true
  - rule_id: 920100
    test_ids: [14]
    reason: |
       Invalid HTTP request line (method |GET) causes Envoy to drop the connection.
    output:
      expect_error: true
  - rule_id: 920181
    test_ids: [1]
    reason: |
      HTTP POST request with both Content-Length and Transfer-Encoding chunked headers.
      Envoy strips the Transfer-Encoding header, so the rule does not trigger.
    output:
      status: 200
      log:
        no_expect_ids: [920181]
  - rule_id: 920420
    test_ids: [4]
    reason: |
       PROPFIND is not a standard HTTP method. Envoy drops the connection (HPE_INVALID_METHOD).
    output:
      expect_error: true
  - rule_id: 934120
    test_ids: [23,24,25,26,39]
    reason: |
      Envoy's http connection manager rejects these requests with: "dispatch error: http/1.1 protocol error: HPE_INVALID_URL". Requests don't reach Coraza and the rule is not triggered.
    output:
      expect_error: true
  # protocol enforcement
  - rule_id: 920280
    test_ids: [3]
    reason: |
      Test expects error 400 (Apache doesn't allow HTTP/0.9).
      But Envoy responds with 426 Upgrade Required.
    output:
      status: 426
      log:
        no_expect_ids: [920280]
  - rule_id: 920430
    test_ids: [3]
    reason: |
      Test expects error 400 (Apache doesn't allow HTTP/0.9).
      But Envoy responds with 426 Upgrade Required.
    output:
      status: 426
      log:
        no_expect_ids: [920430]
  - rule_id: 920430
    test_ids: [5]
    reason: |
      Test expects error 400 because request line without version will be interpreted as HTTP/0.9.
      But Envoy responds with 426 Upgrade Required.
      The original test expects an error because go-ftw can't handle the response from Apache.
    output:
      status: 426
      expect_error: false
      log:
        no_expect_ids: [920430]
  - rule_id: 920430
    test_ids: [6,7,10]
    reason: |
      Completely invalid HTTP versions (1.1, TEST, JUNK/1.0) cause Envoy to drop the connection.
    output:
      expect_error: true
  - rule_id: 920430
    test_ids: [8,9]
    reason: |
      Tests expects the rule in the logs of the unallowed protocols (HTTP/4.0, HTTP/0.8).
      But Envoy responds with 426 Upgrade Required.
    output:
      status: 426
      log:
        no_expect_ids: [920430]
  - rule_id: 944200
    test_ids: [1]
    reason: |
      Original test uses HTTP/1.0, so Envoy responds with HTTP 426 Upgrade Required.
    output:
      status: 426
      log:
        no_expect_ids: [944200]
  - rule_id: 941210
    test_ids: [6]
    reason: |
      Original test uses HTTP/1.0, so Envoy responds with HTTP 426 Upgrade Required.
    output:
      status: 426
      log:
        no_expect_ids: [941210]

  # header sanitizing
  - rule_id: 932161
    test_ids: [7,9,10,11,12]
    reason: |
      These tests try to do RCE injection in the Referer header.
      But the referrer header is sanitized by Envoy and removed from the request.
    output:
      log:
        no_expect_ids: [932161]
  - rule_id: 932207
    test_ids: [1,2,7]
    reason: |
      The test tries to do RCE injection in the Referer header.
      But the referrer header is sanitized by Envoy and removed from the request.
    output:
      log:
        no_expect_ids: [932207]
  - rule_id: 932237
    test_ids: [8,18]
    reason: |
      These tests try to do RCE injection in the Referer header.
      But the referrer header is sanitized by Envoy and removed from the request.
    output:
      log:
        no_expect_ids: [932237]
  - rule_id: 932239
    test_ids: [6,7,19,27,29]
    reason: |
      These tests try to do RCE injection in the Referer header.
      But the referrer header is sanitized by Envoy and removed from the request.
    output:
      log:
        no_expect_ids: [932239]
  - rule_id: 941101
    test_ids: [1]
    reason: |
      These tests try to do XSS injection in the Referer header.
      But the referrer header is sanitized by Envoy and removed from the request.
    output:
      log:
        no_expect_ids: [941101]
  - rule_id: 941110
    test_ids: [4]
    reason: |
      These tests try to do XSS injection in the Referer header.
      But the referrer header is sanitized by Envoy and removed from the request.
    output:
      log:
        no_expect_ids: [941110]
  - rule_id: 942280
    test_ids: [3]
    reason: |
      These tests try to do an SQL delay attack in the Referrer header.
      But the referrer header is sanitized by Envoy and removed from the request.
    output:
      log:
        no_expect_ids: [942280]

  - rule_id: 920210
    test_ids: [2,3,4,6,7]
    reason: |
      Envoy removes the Connection header, thats why the rule doesn't match.
      See: https://github.com/istio/istio/issues/14075#issuecomment-492941926
    output:
      status: 200
      log:
        no_expect_ids: [920181]
  # other Envoy specific
  - rule_id: 932300
    test_ids: [10]
    reason: |
      The match_regex is changed to make it LogFormat agnostic and because Envoy encodes < and >.
    output:
      log:
        expect_ids: [932300]
        match_regex: 'Matched Data:.*MAIL FROM:.*Smith@bar.com.*found within ARGS_POST:textarea:.*MAIL FROM:.*Smith@bar.com'
  - rule_id: 920274
    test_ids: [2,3,5]
    reason: |
      False Positives: Envoy Populates the :path header, therefore invalid characters are detected and
      Coraza correctly triggers the rule 920274.
    output:
      log:
        status: 200
        expect_ids: [920274]
  - rule_id: 920100
    test_ids: [4]
    reason: |
       Envoy sets the CONNECT target in to the :authority header, thats why no route is found.
       Rule 920100 matches with "Invalid HTTP Request Line"
    output:
      status: 404
      log:
        expect_ids: [920100]
  - rule_id: 920100
    test_ids: [6]
    reason: |
       Rule 920100 matches with "Invalid HTTP Request Line"
       Envoy sets the CONNECT target in to the :authority header, thats why no route is found.
    output:
      status: 404
      log:
        expect_ids: [920100]
  - rule_id: 920100
    test_ids: [16]
    reason: |
      Invalid HTTP request line: URI has scheme and authority but no path
      -> Envoy correctly sets the path to / so the request succeeds.
    output:
      status: 200
      log:
        no_expect_ids: [920100]

  # Tests not compatible with Coraza
  - rule_id: 922130
    test_ids: [3,5,6]
    reason: |
      Valid Multipart parsing payloads. Ensure Coraza does not trigger rules 200002 (REQBODY_ERROR), 200003 (MULTIPART_STRICT_ERROR), 922130.
    output:
      log:
        no_expect_ids: [200002,200003,922130]
  - rule_id: 922130
    test_ids: [1,2,7]
    reason: |
      Multipart parsing tests. 922130 rule is not reached, Coraza triggers rule 200003 (MULTIPART_STRICT_ERROR) at parsing time"
    output:
      log:
        expect_ids: [200002,200003]
  - rule_id: 932200
    test_ids: [13]
    reason: |
      The match_regex is changed to match against ARGS_GET instead of ARGS because coraza-waf is built with multi phase evaluation on.
    output:
      log:
        expect_ids: [932200]
        match_regex: 'found within ARGS_GET:host:'
  - rule_id: 933120
    test_ids: [2]
    reason: |
      The match_regex is changed to match against ARGS_POST instead of ARGS because coraza-waf is built with multi phase evaluation on.
    output:
      log:
        expect_ids: [933120]
        match_regex: 'session.referer_check=t found within ARGS_POST:var:'

  # Tests that are different because of our testing setup
  # In most cases this is because we overwrite the host header
  - rule_id: 920280
    test_ids: [1]
    reason: |
      920280-1 tests an empty Host: header which can only be done with HTTP/1.0.
      But we overwrite both, the Host and the protocol in our test setup.
    output:
      log:
        status: 200
        no_expect_ids: [920280]
  - rule_id: 920274
    test_ids: [1]
    reason: |
      Host validation on Apache is the reason the test expects status 400.
      But here go-ftw rewrites the Host header so the request succeeds.
      Envoy Populates the :path header, therefore invalid characters are detected and
      Coraza correctly triggers the rule 920274.
    output:
      log:
        status: 200
        expect_ids: [920274]
  - rule_id: 920290
    test_ids: [1,4]
    reason: |
      On Apache the requests are rejected with error 400 because of the empty Host Header.
      Here go-ftw sets the host header correctly.
    output:
      log:
        status: 200
        no_expect_ids: [920290]
  - rule_id: 920350
    test_ids: [1,3,4,5,6]
    reason: |
      Rule 920350 tests that the Host header is not a numeric IP address.
      These tests check different combinations of IPv4 and IPv6 addresses.
      But here, go-ftw sets the host header to foo.example.com.
    output:
      log:
        status: 200
        no_expect_ids: [920350]
  - rule_id: 931130
    test_ids: [9,11,15]
    reason: |
      Original tests are negative cases with valid hosts, but in the test setup
      the Host is rewritten to foo.example.com.
      This is why "(RFI) Attack: Off-Domain Reference/Link" rule is triggered.
    output:
      log:
        expect_ids: [931130]
  - rule_id: 943110
    test_ids: [4]
    reason: |
      Original test is a negative case with a valid host and referrer. But in the test setup
      the Host is rewritten to foo.example.com and the referrer is sanitized.
      This is why "SessionID Parameter Name with Off-Domain Referer" is triggered.
    output:
      log:
        expect_ids: [943110]
  - rule_id: 980170
    test_ids: [2]
    reason: |
      Test setup replaces the numeric Host header therefore the rule is not triggered.
    output:
      retry_once: false
      log:
        no_expect_ids: [980170]
  - rule_id: 920270
    test_ids: [4]
    reason: |
      The test expects response code 400 because apache drops the request due to the % character in the host header.
      In the test setup the Host header is replaced so we get an HTTP 200 response instead.
      The rewriting is also the reason why the rule doesn't match (no more % character).
    output:
      status: 200
      log:
        no_expect_ids: [920270]
        expect_ids: [920274]
  - rule_id: 922130
    test_ids: [4]
    reason: |
      The match_regex is changed to make it LogFormat agnostic. Rule 922130 is triggered.
    output:
      log:
        expect_ids: [922130]
        match_regex: 'id.*922130.*"Multipart header contains characters outside of valid range".*'

  # Backslash URIs and other inputs that Envoy's HTTP parser rejects
  - rule_id: 920460
    test_ids: [2,3,4,5]
    reason: |
      Backslash in URI causes Envoy to drop the connection (HPE_INVALID_URL).
      The request never reaches Coraza.
    output:
      expect_error: true
  - rule_id: 930110
    test_ids: [8,12]
    reason: |
      Backslash in URI causes Envoy to drop the connection (HPE_INVALID_URL).
      The request never reaches Coraza.
    output:
      expect_error: true
  - rule_id: 932210
    test_ids: [1,2,3,4]
    reason: |
      Backslash in URI causes Envoy to drop the connection (HPE_INVALID_URL).
      The request never reaches Coraza.
    output:
      expect_error: true
  - rule_id: 932260
    test_ids: [17]
    reason: |
      Backslash in URI causes Envoy to drop the connection (HPE_INVALID_URL).
      The request never reaches Coraza.
    output:
      expect_error: true
  - rule_id: 934120
    test_ids: [41,42]
    reason: |
      Backslash in URI causes Envoy to drop the connection (HPE_INVALID_URL).
      The request never reaches Coraza.
    output:
      expect_error: true
  - rule_id: 941100
    test_ids: [1]
    reason: |
      Backslash in URI causes Envoy to drop the connection (HPE_INVALID_URL).
      The request never reaches Coraza.
    output:
      expect_error: true
  - rule_id: 941160
    test_ids: [1]
    reason: |
      Backslash in URI causes Envoy to drop the connection (HPE_INVALID_URL).
      The request never reaches Coraza.
    output:
      expect_error: true
  - rule_id: 941330
    test_ids: [1]
    reason: |
      Backslash in URI causes Envoy to drop the connection (HPE_INVALID_URL).
      The request never reaches Coraza.
    output:
      expect_error: true
  - rule_id: 949110
    test_ids: [1,5]
    reason: |
      Invalid HTTP methods or backslash URIs cause Envoy to drop the connection.
      The request never reaches Coraza.
    output:
      expect_error: true

  # Tests not entirely clear why they behave differently
  - rule_id: 920171
    test_ids: [2,3]
    reason: |
      Rule 920171 not detected. GET/HEAD with body.
      Envoy doesn't read the body on HEAD request and removes the TE header on GET.
    output:
      status: 200
      log:
        no_expect_ids: [920171]
  - rule_id: 921140
    test_ids: [1]
    reason: |
      Test expects 400 but envoy responds with 200 ok. The rule does not match as expected.
      Envoy likely removes the newline character from the header.
    output:
      status: 200
